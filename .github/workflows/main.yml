name: Publish
on:
  push:
    branches:
      - main # Default release branch, may also be named 'master' or 'develop'
  workflow_dispatch: 
    
env:
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  TERM: xterm

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    steps:
      
      # - name: Setup dotnet
      #   uses: actions/setup-dotnet@v1
      #   with:
      #     dotnet-version: 3.1.200

    - name: Checkout code
      uses: actions/checkout@v4
      
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'        

    - name: Set version
      run: echo "VERSION=2.0.$GITHUB_RUN_NUMBER" >> $GITHUB_ENV

    - name: Print version
      run: echo "Building $VERSION"

    - name: Test
      run: dotnet test -f net10.0

    - name: Clean
      run: dotnet clean

    - name: Build all in release mode
      run: dotnet build CloudMesh.sln -c Release /p:CI=true /p:Version=$VERSION
        
    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Publish
      run: dotnet nuget push **\*.nupkg --source 'https://api.nuget.org/v3/index.json' --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}}
    